{% extends "base.html" %}

{% block title %}Редактировать слово{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Редактирование слова</h1>
    <p class="page-subtitle">
        Здесь вы можете изменить слово и его значение.
    </p>
</div>

<div class="card form-card">
    <h2 class="section-title">✏ Изменить слово</h2>
    <p class="section-subtitle">
        Текущее слово: <strong>{{ article.title }}</strong>
    </p>

    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}

        <div class="card-actions">
            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
            <a href="{% url 'article_list' %}" class="btn btn-secondary btn-link-reset">Назад к словарю</a>
        </div>
    </form>
</div>
{% endblock %}
